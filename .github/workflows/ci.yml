name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-asyncio hypothesis
          # Optional cloud packages – failure is OK
          pip install supabase twilio streamlit-back-camera-input streamlit-searchbox || true

      - name: Lint with flake8
        run: |
          python -m flake8 backend/ --max-line-length=120 --ignore=E501,W503,E221,E241,E302,E305,W293

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short

      - name: Deploy to Streamlit Cloud
        if: github.ref == 'refs/heads/main'
        env:
          STREAMLIT_TOKEN: ${{ secrets.STREAMLIT_TOKEN }}
        run: |
          if [ -z "$STREAMLIT_TOKEN" ]; then
            echo "STREAMLIT_TOKEN not set, skipping deployment."
            exit 0
          fi
          pip install streamlit
          streamlit deploy --token $STREAMLIT_TOKEN --repo ${{ github.repository }} --branch main --file streamlit_app.py
