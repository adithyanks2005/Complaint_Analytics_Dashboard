name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install streamlit pandas plotly python-dotenv pytest flake8
          # Install supabase + twilio only if available (optional services)
          pip install supabase twilio || true

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/complaint-dashboard:latest .

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image to GHCR
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/complaint-dashboard:latest

      - name: Lint with flake8
        run: |
          flake8 backend/ --max-line-length=120 --ignore=E501,W503

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short
